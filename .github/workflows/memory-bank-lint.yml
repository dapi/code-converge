name: Verify

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.21.13'
          cache-dependency-path: go.mod
      - run: make verify
      - name: Cross-compile Windows binary
        run: GOOS=windows GOARCH=amd64 go build -o "$RUNNER_TEMP/code-converge.exe" ./cmd/code-converge
      - run: make dist
      - name: Smoke Linux AMD64 artifact
        run: |
          mkdir -p "$RUNNER_TEMP/code-converge-smoke"
          tar -xzf dist/code-converge_dev_linux_amd64.tar.gz -C "$RUNNER_TEMP/code-converge-smoke"
          HOME="$RUNNER_TEMP/code-converge-home" "$RUNNER_TEMP/code-converge-smoke/code-converge" config
