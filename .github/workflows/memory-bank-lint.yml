name: Memory Bank lint

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'memory-bank/**'
      - 'AGENTS.md'
      - '.protocols/**'
      - 'README.md'
      - 'Makefile'
      - 'scripts/check-markdown-links.go'
      - '.github/workflows/memory-bank-lint.yml'
  push:
    branches: [master]
    paths:
      - 'memory-bank/**'
      - 'AGENTS.md'
      - '.protocols/**'
      - 'README.md'
      - 'Makefile'
      - 'scripts/check-markdown-links.go'
      - '.github/workflows/memory-bank-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.21.13'
      - run: make docs-lint
