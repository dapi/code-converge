name: Verify

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.21.13'
      - run: make verify
      - run: make dist
      - name: Smoke Linux AMD64 artifact
        run: |
          mkdir -p "$RUNNER_TEMP/code-converge-smoke"
          tar -xzf dist/code-converge_dev_linux_amd64.tar.gz -C "$RUNNER_TEMP/code-converge-smoke"
          HOME="$RUNNER_TEMP/code-converge-home" "$RUNNER_TEMP/code-converge-smoke/code-converge" config
